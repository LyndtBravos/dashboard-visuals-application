<div *ngIf="isVisible" class="confirm-overlay" (click)="onCancel()">
  <div class="confirm-modal" (click)="$event.stopPropagation()" [ngClass]="getHeaderClass()">
    <div class="confirm-header">
      <span class="confirm-icon">{{ getIcon() }}</span>
      <h3>{{ options.title }}</h3>
      <button class="confirm-close" (click)="onCancel()">×</button>
    </div>
    
    <div class="confirm-body">
      <p>{{ options.message }}</p>
    </div>
    
    <div class="confirm-footer">
      <button class="confirm-btn confirm-btn-cancel" (click)="onCancel()">
        {{ options.cancelText }}
      </button>
      <button class="confirm-btn" [ngClass]="getConfirmButtonClass()" (click)="onConfirm()">
        {{ options.confirmText }}
      </button>
    </div>
  </div>
</div>
