<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Join Dashboard Visuals Application</p>
    </div>
    
    <div class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </div>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input 
          type="text" 
          id="name"
          name="name"
          [(ngModel)]="user.name"
          required
          placeholder="Enter your full name">
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email"
          name="email"
          [(ngModel)]="user.email"
          required
          placeholder="Enter your email address">
      </div>
      
      <div class="form-group">
        <label for="userId">User ID (3 characters)</label>
        <input 
          type="text" 
          id="userId"
          name="userId"
          [(ngModel)]="user.userId"
          required
          maxlength="4"
          placeholder="Enter 3-character ID"
          autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          name="password"
          [(ngModel)]="user.password"
          required
          placeholder="Create a password (min. 6 characters)">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="user.confirmPassword"
          required
          placeholder="Confirm your password">
      </div>
      
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
      
      <button type="submit" class="btn-primary btn-block" [disabled]="isLoading">
        {{ isLoading ? 'Creating Account...' : 'Register' }}
      </button>
      
      <div class="auth-footer">
        <p>Already have an account? <a routerLink="/login">Sign in here</a></p>
      </div>
    </form>
  </div>
</div>
