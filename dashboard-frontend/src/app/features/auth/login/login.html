<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Dashboard Visuals Application</h1>
      <p>Sign in to access your monitoring dashboard</p>
    </div>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="userId">User ID</label>
        <input 
          type="text" 
          id="userId"
          name="userId"
          [(ngModel)]="credentials.userId"
          required
          placeholder="Enter your 3-character User ID"
          autocomplete="username"
          [class.error]="errorMessage && !credentials.userId">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          placeholder="Enter your password"
          autocomplete="current-password"
          [class.error]="errorMessage && !credentials.password">
      </div>
      
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
      
      <button type="submit" class="btn-primary btn-block" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
      
      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/register">Register here</a></p>
      </div>
    </form>
  </div>
</div>
