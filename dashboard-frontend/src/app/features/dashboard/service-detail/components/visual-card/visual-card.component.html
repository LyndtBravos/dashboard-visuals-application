<div class="visual-card" [style.width]="getCardWidth()">
  <div class="card-header">
    <h3>{{ visual.name }}</h3>
    <div class="card-actions">
      <button class="icon-btn recheck" (click)="onRecheck()" title="Recheck now" [disabled]="isLoading">🔄</button>
      <button class="icon-btn edit" (click)="onEdit()" title="Edit">✏️</button>
      <button class="icon-btn delete" (click)="onDelete()" title="Delete">🗑️</button>
    </div>
  </div>
  
  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-content">
    <div class="mini-loader"></div>
    <span>Loading data...</span>
  </div>
  
  <!-- Error State -->
  <div *ngIf="errorMessage && !isLoading" class="error-content">
    <span class="error-icon">⚠️</span>
    <span class="error-text">{{ errorMessage }}</span>
  </div>
  
  <!-- Content -->
  <ng-container *ngIf="!isLoading && !errorMessage">
    <div class="card-content">
      <!-- Text/Text Minutes/Status Indicator -->
      <div *ngIf="visual.graphType === 'text' || visual.graphType === 'text_minutes' || visual.graphType === 'status_indicator'"
           class="text-value" [ngClass]="getStatusColor()">
        {{ formatValue() }}
      </div>
      
      <!-- Bar Chart -->
      <div *ngIf="visual.graphType === 'bar'" class="chart-container" [style.height]="getChartHeight()">
        <canvas [id]="'chart-' + visual.id"></canvas>
      </div>
      
      <!-- Time Series -->
      <div *ngIf="visual.graphType === 'time_series'" class="chart-container" [style.height]="getChartHeight()">
        <canvas [id]="'chart-' + visual.id"></canvas>
      </div>
    </div>
    
    <div class="card-footer" *ngIf="lastChecked">
      <span>Last checked: {{ lastChecked | date:'medium' }}</span>
      <span *ngIf="visual.graphType === 'bar' || visual.graphType === 'time_series'" class="data-stats">
        {{ chartData?.rowCount || 0 }} records
      </span>
    </div>
  </ng-container>
</div>
